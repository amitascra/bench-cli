
[bench]
name = "ci-bench"
python = "3.14"
http_port = 8000
socketio_port = 9000

[[apps]]
name = "frappe"
repo = "https://github.com/frappe/frappe"
branch = "version-16"

[[apps]]
name = "blog"
repo = "https://github.com/frappe/blog"
branch = "develop"

[[sites]]
name = "site1.localhost"
admin_password = "admin"
apps = ["frappe"]

[[sites]]
name = "site2.localhost"
admin_password = "admin"
apps = ["frappe", "blog"]

[mariadb]
host = "localhost"
port = 3306
root_password = "admin"

[redis]
cache_port = 13000
queue_port = 11000
socketio_port = 12000

[workers]
default = 1
short = 1
long = 1
